---
- name: Setup OpenVPN Server on Ubuntu
  hosts: server_OpenVPN
  become: true

  vars:
    openvpn_dir: /etc/openvpn
    easyrsa_dir: /etc/openvpn/easy-rsa
    server_name: server
    my_subnet_ip: 172.31.0.0
    subnet_mask: 255.255.0.0
    route_all_traffic: false
    login_with_otp: false

  tasks:
    # -------------------------------------------------------
    # Install packages
    # -------------------------------------------------------
    - name: Install openvpn and easy-rsa
      ansible.builtin.apt:
        name:
          - openvpn
          - easy-rsa
        state: present
        update_cache: true

    - name: Install Google Authenticator PAM module
      ansible.builtin.apt:
        name: libpam-google-authenticator
        state: present
      when: login_with_otp | bool


    # -------------------------------------------------------
    # Setup Easy-RSA PKI
    # -------------------------------------------------------
    - name: Create symbolic link to easy-rsa 
      ansible.builtin.file:
        src: /usr/share/easy-rsa
        dest: "{{ easyrsa_dir }}"
        state: link

    - name: Initialize PKI
      ansible.builtin.command:
        cmd: ./easyrsa --batch init-pki
        chdir: "{{ easyrsa_dir }}"
        creates: "{{ easyrsa_dir }}/pki"

    - name: Build CA (no password)
      ansible.builtin.command:
        cmd: ./easyrsa --batch build-ca nopass
        chdir: "{{ easyrsa_dir }}"
        creates: "{{ easyrsa_dir }}/pki/ca.crt"

    - name: Generate server certificate and key
      ansible.builtin.command:
        cmd: ./easyrsa --batch build-server-full server nopass
        chdir: "{{ easyrsa_dir }}"
        creates: "{{ easyrsa_dir }}/pki/issued/server.crt"

    - name: Check created server certificate and key file
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - "{{ easyrsa_dir }}/pki/issued/server.crt"
        - "{{ easyrsa_dir }}/pki/private/server.key"
      register: key_files

    - name: Fail the playbook if any file is missing
      ansible.builtin.assert:
        that: 
          - item.stat.exists | bool
      loop: "{{ key_files.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Generate Diffie Hellman parameters
      ansible.builtin.command:
        cmd: ./easyrsa --batch gen-dh
        chdir: "{{ easyrsa_dir }}"
        creates: "{{ easyrsa_dir }}/pki/dh.pem"

    # -------------------------------------------------------
    # Server configuration
    # -------------------------------------------------------
    - name: Create openvpn server directory
      ansible.builtin.file:
        path: "{{ openvpn_dir }}/server"
        state: directory
        mode: "0700"

    - name: Check the configuration file already exists
      ansible.builtin.stat:
        path: "{{ openvpn_dir }}/server/{{ server_name }}.conf"
      register: conf_file

    - name: Create server configuration
      when: not conf_file.stat.exists
      ansible.builtin.copy:
        src: "/usr/share/doc/openvpn/examples/sample-config-files/server.conf"
        dest: "{{ openvpn_dir }}/server/{{ server_name }}.conf"
        remote_src: true
        force: false

    - name: Configure key files
      when: not conf_file.stat.exists
      ansible.builtin.lineinfile:
        path: "{{ openvpn_dir }}/server/{{ server_name }}.conf"
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
      loop:
        - { regexp: '^ca ca.crt.*$', line: "ca {{ easyrsa_dir }}/pki/ca.crt" }
        - { regexp: '^cert server.crt.*$', line: "cert {{ easyrsa_dir }}/pki/issued/server.crt" }
        - { regexp: '^key server.key.*$', line: "key {{ easyrsa_dir }}/pki/private/server.key" }
        - { regexp: '^dh dh.*.pem.*$', line: "dh {{ easyrsa_dir }}/pki/dh.pem" }

    - name: Configure to route all internet traffic via OpenVPN
      when: (not conf_file.stat.exists) and (route_all_traffic | bool)
      ansible.builtin.lineinfile:
        path: "{{ openvpn_dir }}/server/{{ server_name }}.conf"
        regexp: '^push "redirect-gateway def1 bypass-dhcp"$'
        line: 'push "redirect-gateway def1 bypass-dhcp"'
    
    - name: Push route for VPC or Subnet
      when: not conf_file.stat.exists
      ansible.builtin.blockinfile:
        path: "{{ openvpn_dir }}/server/{{ server_name }}.conf"
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        insertafter: '^;push "route (.+)$'
        block: 'push "route {{ my_subnet_ip }} {{ subnet_mask }}"'

    - name: Comment out TLS auth
      when: not conf_file.stat.exists
      ansible.builtin.replace:
        path: "{{ openvpn_dir }}/server/{{ server_name }}.conf"
        regexp: '^tls-auth (.+$)'
        replace: '#tls-auth \1'

    - name: Enable PAM plugin in server config
      ansible.builtin.lineinfile:
        path: "{{ openvpn_dir }}/server/{{ server_name }}.conf"
        line: "{{ item }}"
        insertafter: EOF
      loop:
        - "plugin /usr/lib/{{ ansible_facts['architecture'] }}-linux-gnu/openvpn/plugins/openvpn-plugin-auth-pam.so openvpn"
        - "verify-client-cert none"
        - "username-as-common-name"
      when: login_with_otp | bool

    - name: Configure PAM for OpenVPN OTP
      ansible.builtin.copy:
        dest: /etc/pam.d/openvpn
        content: |
          auth required pam_google_authenticator.so
          account required pam_permit.so
        mode: '0644'
      when: login_with_otp | bool

    # -------------------------------------------------------
    # Firewall & IP forwarding
    # -------------------------------------------------------
    - name: Install ufw
      ansible.builtin.apt:
        name: ufw
        state: present

    - name: Enable and start ufw service
      ansible.builtin.systemd:
        name: ufw
        enabled: true
        state: started

    - name: Allow SSH port in ufw
      community.general.ufw:
        rule: allow
        port: '22'
        proto: tcp

    - name: Allow OpenVPN port in ufw
      community.general.ufw:
        rule: allow
        port: '1194'
        proto: udp

    - name: Enable NAT masquerade in ufw
      ansible.builtin.blockinfile:
        path: /etc/ufw/before.rules
        marker: "# {mark} ANSIBLE MANAGED BLOCK - OpenVPN NAT"
        insertbefore: "^\\*filter"
        block: |
          *nat
          :POSTROUTING ACCEPT [0:0]
          -A POSTROUTING -s 10.8.0.0/8 -o eth0 -j MASQUERADE
          COMMIT

    - name: Enable ufw forwarding policy
      ansible.builtin.lineinfile:
        path: /etc/default/ufw
        regexp: '^DEFAULT_FORWARD_POLICY='
        line: 'DEFAULT_FORWARD_POLICY="ACCEPT"'

    - name: Reload ufw
      community.general.ufw:
        state: enabled

    - name: Enable IP forwarding
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: '1'
        sysctl_set: true
        state: present
        reload: true

    # -------------------------------------------------------
    # Starting OpenVPN server
    # -------------------------------------------------------
    - name: Enable and start openvpn-server service
      ansible.builtin.systemd:
        name: "openvpn-server@{{ server_name }}.service"
        enabled: true
        state: started
        daemon_reload: true
