---
- name: Install and configure k3s Server
  hosts: k3s_ha_server_0
  become: yes
  tasks:
    - name: Install k3s
      shell: |
        curl -sfL https://get.k3s.io | K3S_TOKEN={{ k3s_token }} sh -s - server \
        --cluster-init \
        --tls-san={{ nlb_public_ip }}

    - name: Create k3s config file
      copy:
        content: |
          write-kubeconfig-mode: "0644"
        dest: /etc/rancher/k3s/config.yaml
        mode: '0644'

    - name: Restart k3s service
      systemd:
        name: k3s
        state: restarted

    - name: Fetch kubeconfig file
      fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: ./kubeconfig-k3s-multi.yaml
        flat: yes

    - name: Replace localhost with public IP in kubeconfig
      become: no
      local_action:
        module: replace
        path: ./kubeconfig-k3s-multi.yaml
        regexp: '127\.0\.0\.1'
        replace: "{{ nlb_public_ip }}"

- name: Install k3s Agent
  hosts: k3s_ha_server_1,k3s_ha_server_2
  become: yes
  tasks:
    - name: Install k3s
      shell: |
        curl -sfL https://get.k3s.io | K3S_TOKEN={{ k3s_token }} sh -s - server \
        --server https://{{ hostvars[groups['k3s_ha_server_0'][0]]['private_ip_address'] }}:6443 \
        --tls-san={{ nlb_public_ip }}
